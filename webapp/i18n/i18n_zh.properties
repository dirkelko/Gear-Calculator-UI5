# Help text
helpTitle=说明
helpText=购买新自行车或升级旧自行车时，齿轮计算器可以帮助您找到最佳的齿轮配置。齿轮计算器以图形方式显示给定齿轮系统（包括变速器或内变速花鼓）所有齿轮的速度和齿数（以英寸或米为单位）。\n 齿轮系统、牙盘和飞轮可以从给定列表中选择，也可以通过移动齿轮图标进行选择。如需删除未使用的牙盘和飞轮，将其移动到最左齿轮图标。 \n 您可以从列表中选择轮胎尺寸，也可以输入轮胎周长（以毫米为单位）。 \n \n 当然，齿比计算器并不知道您的骑行能力。因此，最好从您自行车的齿比数据入手，使用您已知的齿比，或者从中了解在特定速度下是否缺少某些齿比。齿比计算器以典型的山地自行车 2x10 设置开始。比较选项可以找到更适合您骑行风格的齿比。\n 您还可以比较两辆轮胎尺寸不同的自行车。\n 如果图形中的三角形距离相等，则齿比的差异百分比通常相同。齿比之间的步长百分比和总齿比范围显示在灰色栏中。\n 允许的最大链条角度定义了应避免使用的齿比。\n 底部的链接将打开齿比计算器，其中包含当前选定的设置，这对于在线讨论很有用。 \n 对于特殊情况或假设问题（例如，“如果齿轮超过 13 个会怎样？”），可以在设置（右上角的链轮）中扩展可能的齿数或牙盘和飞轮的数量。
